name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --draft

  build-docker:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kizuna
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.ref_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-desktop-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version from git tag (Windows)
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting tauri.conf.json version to $VERSION"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('apps/desktop/src-tauri/tauri.conf.json', 'utf8'));
            conf.version = process.argv[1];
            fs.writeFileSync('apps/desktop/src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          " "$VERSION"

      - name: Build Tauri (Windows)
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: pnpm tauri build

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          FILES=(
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi.sig
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
          )
          if [ ${#FILES[@]} -gt 0 ]; then
            gh release upload "$GITHUB_REF_NAME" "${FILES[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          fi

  build-desktop-linux:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libpipewire-0.3-dev libspa-0.2-dev libgbm-dev libasound2-dev libfuse2 dpkg-dev

      # ── WebKit WebRTC build / cache ────────────────────────────────

      - name: Detect webkit2gtk version
        run: |
          PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig" pkg-config --modversion webkit2gtk-4.1
          echo "WEBKIT_VER=$(pkg-config --modversion webkit2gtk-4.1)" >> $GITHUB_ENV
          echo "WEBKIT_TAR=webkit-webrtc-linux-x64_$(pkg-config --modversion webkit2gtk-4.1).tar.gz" >> $GITHUB_ENV
          echo "WEBKIT_TAG=webkit-webrtc-v$(pkg-config --modversion webkit2gtk-4.1)" >> $GITHUB_ENV

      - name: Try restore cached webkit WebRTC build
        id: cache-restore
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release download "$WEBKIT_TAG" \
            --pattern "$WEBKIT_TAR" \
            --repo "$GITHUB_REPOSITORY" \
            --dir /tmp/webrtc-cache 2>/dev/null || true

          if [ -f "/tmp/webrtc-cache/$WEBKIT_TAR" ]; then
            echo "Extracting cached build..."
            sudo tar xzf "/tmp/webrtc-cache/$WEBKIT_TAR" -C /
            # Verify the extraction actually put files in place
            if find /usr/local/lib -name "libwebkit2gtk-4.1.so*" -print -quit 2>/dev/null | grep -q .; then
              echo "WEBKIT_CACHED=true" >> $GITHUB_ENV
              echo "Cache valid — WebRTC webkit found"
            else
              echo "WEBKIT_CACHED=false" >> $GITHUB_ENV
              echo "Cache INVALID (no .so files after extraction) — forcing rebuild"
            fi
          else
            echo "WEBKIT_CACHED=false" >> $GITHUB_ENV
            echo "No cache — will build from source"
          fi

      - name: Build webkit2gtk with WebRTC (apt source)
        if: env.WEBKIT_CACHED == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Building webkit2gtk-4.1 $WEBKIT_VER with ENABLE_WEB_RTC=ON..."

          # Enable source repos (required for apt source)
          sudo sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || \
            sudo sed -i 's/^# deb-src /deb-src /' /etc/apt/sources.list
          sudo apt-get update

          # Build dependencies (use build-dep for full coverage)
          sudo apt-get build-dep -y webkit2gtk || true
          sudo apt-get install -y \
            cmake ninja-build gperf bison flex ruby python3 perl \
            libgstreamer1.0-dev libgstreamer-plugins-bad1.0-dev || true

          WORKDIR=$(mktemp -d)
          cd "$WORKDIR"
          apt source webkit2gtk
          cd webkit2gtk-*

          cmake -B build -G Ninja \
            -DPORT=GTK \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_SOUP3=ON \
            -DENABLE_WEB_RTC=ON \
            -DUSE_GTK4=OFF \
            -DENABLE_GAMEPAD=OFF \
            -DENABLE_DOCUMENTATION=OFF \
            -DENABLE_SPEECH_SYNTHESIS=OFF \
            -DUSE_LIBBACKTRACE=OFF \
            -DUSE_LIBRICE=OFF \
            -DUSE_SYSTEM_MALLOC=ON

          ninja -C build -j$(nproc)
          sudo ninja -C build install

          # Find where the libraries were actually installed (may be multiarch)
          WEBKIT_LIB=$(find /usr/local/lib -name "libwebkit2gtk-4.1.so*" -type f 2>/dev/null | head -1)
          JSCORE_LIB=$(find /usr/local/lib -name "libjavascriptcoregtk-4.1.so*" -type f 2>/dev/null | head -1)
          WEBKIT_PC=$(find /usr/local/lib -name "webkit2gtk-4.1.pc" -type f 2>/dev/null | head -1)

          if [ -z "$WEBKIT_LIB" ]; then
            echo "ERROR: webkit2gtk build appeared to succeed but libwebkit2gtk-4.1.so not found under /usr/local/lib/"
            find /usr/local -name "libwebkit2gtk*" 2>/dev/null | head -10
            exit 1
          fi

          echo "Packaging for cache: $WEBKIT_LIB"
          WEBKIT_LIBDIR=$(dirname "$WEBKIT_LIB")
          JSCORE_LIBDIR=$(dirname "$JSCORE_LIB")
          WEBKIT_PCDIR=$(dirname "$WEBKIT_PC")
          # Use find + tar pipeline so globs resolve relative to /, not CWD
          (cd / && find \
            "${WEBKIT_LIBDIR#/}" "${JSCORE_LIBDIR#/}" "${WEBKIT_PCDIR#/}" \
            -maxdepth 1 -type f \
            \( -name "libwebkit2gtk-4.1.so*" -o -name "libjavascriptcoregtk-4.1.so*" -o -name "webkit2gtk-4.1.pc" \) \
            -print0 | tar czf "/tmp/$WEBKIT_TAR" --null -T -)

          # Upload cache artifact to a release tag
          if ! gh release view "$WEBKIT_TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            gh release create "$WEBKIT_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "WebKit WebRTC $WEBKIT_VER" \
              --notes "Pre-built webkit2gtk-4.1 with ENABLE_WEB_RTC=ON" \
              --prerelease || true
          fi
          gh release upload "$WEBKIT_TAG" "/tmp/$WEBKIT_TAR" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber || true

          echo "WebKit WebRTC build + upload complete."

      - name: Setup webkit WebRTC libs
        run: |
          set -euo pipefail
          # If built from source (cache miss or invalid), extract the local tarball
          if [ "$WEBKIT_CACHED" = "false" ]; then
            if [ -f "/tmp/$WEBKIT_TAR" ]; then
              echo "Extracting from local build..."
              sudo tar xzf "/tmp/$WEBKIT_TAR" -C /
            else
              echo "ERROR: No webkit WebRTC tarball found (neither cache nor local build)"
              exit 1
            fi
          fi
          # Configure library search paths via ldconfig (no env vars — linuxdeploy chokes on custom LD_LIBRARY_PATH)
          echo "/usr/local/lib" | sudo tee /etc/ld.so.conf.d/webrtc-webkit.conf
          if [ -d "/usr/local/lib/x86_64-linux-gnu" ]; then
            echo "/usr/local/lib/x86_64-linux-gnu" | sudo tee -a /etc/ld.so.conf.d/webrtc-webkit.conf
            # Symlink .so files to /usr/local/lib/ so the linker finds them without env vars
            sudo ln -sf /usr/local/lib/x86_64-linux-gnu/libwebkit2gtk-4.1.so* /usr/local/lib/ 2>/dev/null || true
            sudo ln -sf /usr/local/lib/x86_64-linux-gnu/libjavascriptcoregtk-4.1.so* /usr/local/lib/ 2>/dev/null || true
            # Symlink .pc file so pkg-config finds it on its default search path
            sudo mkdir -p /usr/local/lib/pkgconfig
            sudo ln -sf /usr/local/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc /usr/local/lib/pkgconfig/ 2>/dev/null || true
          fi
          sudo ldconfig

          echo "=== Verifying WebRTC webkit libs ==="
          if find /usr/local/lib -name "libwebkit2gtk-4.1.so*" -print -quit 2>/dev/null | grep -q .; then
            find /usr/local/lib -name "libwebkit2gtk-4.1.so*" -ls 2>/dev/null
            echo "WebKit WebRTC libs ready."
          else
            echo "FATAL: No libwebkit2gtk-4.1 found in /usr/local/lib after setup!"
            find /usr -name "libwebkit2gtk-4.1.so*" 2>/dev/null | head -10
            exit 1
          fi

      # ── End WebKit block ────────────────────────────────────────────

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set RPATH for bundled WebKit (Linux)
        run: echo 'RUSTFLAGS=-C link-args=-Wl,-rpath,$ORIGIN/../lib' >> "$GITHUB_ENV"

      - name: Set version from git tag (Linux)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting tauri.conf.json version to $VERSION"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('apps/desktop/src-tauri/tauri.conf.json', 'utf8'));
            conf.version = process.argv[1];
            fs.writeFileSync('apps/desktop/src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          " "$VERSION"

      - name: Build Tauri (Linux)
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/usr/local/lib/x86_64-linux-gnu/pkgconfig
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: pnpm tauri build --bundles deb

      - name: Build AppImage with bundled WebKit WebRTC
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          set -euo pipefail
          SRC_TARGET="apps/desktop/src-tauri/target/release"
          BINARY="$SRC_TARGET/kizuna"
          BUNDLE_DIR="$SRC_TARGET/bundle/appimage"
          ICON_DIR="apps/desktop/src-tauri/icons"
          APPDIR="/tmp/kizuna.AppDir"

          if [ ! -f "$BINARY" ]; then
            echo "ERROR: binary not found at $BINARY"
            exit 1
          fi

          # Locate the custom WebRTC-enabled webkit libs
          WEBKIT_SO=$(find /usr/local/lib -maxdepth 3 -name "libwebkit2gtk-4.1.so.0" 2>/dev/null | head -1)
          JSCORE_SO=$(find /usr/local/lib -maxdepth 3 -name "libjavascriptcoregtk-4.1.so.0" 2>/dev/null | head -1)

          if [ -z "$WEBKIT_SO" ]; then
            echo "ERROR: custom WebRTC webkit2gtk not found in /usr/local/lib/"
            find /usr -name "libwebkit2gtk-4.1.so*" 2>/dev/null | head -10 || true
            exit 1
          fi

          WEBKIT_DIR=$(dirname "$WEBKIT_SO")
          JSCORE_DIR=$(dirname "$JSCORE_SO")
          echo "Found WebRTC webkit at $WEBKIT_SO"

          # Create fresh AppDir
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/lib" "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          # Copy binary
          cp "$BINARY" "$APPDIR/usr/bin/kizuna"
          chmod +x "$APPDIR/usr/bin/kizuna"

          # Copy bundled WebRTC webkit libs
          cp -v "$WEBKIT_DIR"/libwebkit2gtk-4.1.so* "$APPDIR/usr/lib/"
          cp -v "$JSCORE_DIR"/libjavascriptcoregtk-4.1.so* "$APPDIR/usr/lib/"

          # Verify RPATH
          echo "Binary RPATH:"
          patchelf --print-rpath "$APPDIR/usr/bin/kizuna" || true

          # Copy icon (use largest PNG available)
          ICON_SRC=$(ls "$ICON_DIR"/128x128@2x.png "$ICON_DIR"/128x128.png "$ICON_DIR"/icon.png 2>/dev/null | head -1)
          if [ -n "$ICON_SRC" ]; then
            cp "$ICON_SRC" "$APPDIR/usr/share/icons/hicolor/256x256/apps/kizuna.png"
            cp "$ICON_SRC" "$APPDIR/kizuna.png"
          fi

          # Desktop file
          cat > "$APPDIR/kizuna.desktop" << 'DESKTOPEOF'
[Desktop Entry]
Type=Application
Name=Kizuna
Comment=Self-hosted voice & chat
Exec=kizuna
Icon=kizuna
Categories=Network;Chat;
DESKTOPEOF

          # AppRun entry point (use Tauri's AppRun binary)
          wget -q "https://github.com/tauri-apps/binary-releases/releases/download/apprun-old/AppRun-x86_64" -O "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          # Download appimagetool and package
          mkdir -p "$BUNDLE_DIR"
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          APPIMAGE_OUT="$BUNDLE_DIR/kizuna.AppImage"
          rm -f "$APPIMAGE_OUT"
          ARCH=x86_64 /tmp/appimagetool "$APPDIR" "$APPIMAGE_OUT"

          echo "AppImage built successfully"
          ls -la "$APPIMAGE_OUT"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          FILES=(
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage.sig
          )
          if [ ${#FILES[@]} -gt 0 ]; then
            gh release upload "$GITHUB_REF_NAME" "${FILES[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          fi

  publish-release:
    needs: [build-docker, build-desktop-windows, build-desktop-linux]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false

      - name: Generate and upload updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="$GITHUB_REF_NAME"
          REPO="$GITHUB_REPOSITORY"

          echo "Getting release assets for $RELEASE_TAG..."
          ASSETS_JSON=$(gh api "repos/$REPO/releases/tags/$RELEASE_TAG" --jq '[.assets[] | {name, browser_download_url}]')

          # Build platforms object from .sig files
          PLATFORMS="{}"
          for row in $(echo "$ASSETS_JSON" | jq -c '.[]'); do
            name=$(echo "$row" | jq -r '.name')
            url=$(echo "$row" | jq -r '.browser_download_url')

            case "$name" in
              *.AppImage.sig)
                bundle_name="${name%.sig}"
                bundle_url=$(echo "$ASSETS_JSON" | jq -r --arg n "$bundle_name" '.[] | select(.name == $n) | .browser_download_url')
                sig_content=$(curl -sL "$url")
                PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$sig_content" --arg u "$bundle_url" '. + {"linux-x86_64": {signature: $sig, url: $u}}')
                echo "  Added linux-x86_64: $bundle_name"
                ;;
              *.msi.sig)
                bundle_name="${name%.sig}"
                bundle_url=$(echo "$ASSETS_JSON" | jq -r --arg n "$bundle_name" '.[] | select(.name == $n) | .browser_download_url')
                sig_content=$(curl -sL "$url")
                PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$sig_content" --arg u "$bundle_url" '. + {"windows-x86_64": {signature: $sig, url: $u}}')
                echo "  Added windows-x86_64 (msi): $bundle_name"
                ;;
              *.exe.sig)
                bundle_name="${name%.sig}"
                bundle_url=$(echo "$ASSETS_JSON" | jq -r --arg n "$bundle_name" '.[] | select(.name == $n) | .browser_download_url')
                sig_content=$(curl -sL "$url")
                # NSIS installer gets its own platform entry; uses same key
                # Only add if no msi.sig already set the key
                if echo "$PLATFORMS" | jq -e 'has("windows-x86_64")' > /dev/null 2>&1; then
                  echo "  Skipped windows-x86_64 (nsis): already set via msi"
                else
                  PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$sig_content" --arg u "$bundle_url" '. + {"windows-x86_64": {signature: $sig, url: $u}}')
                  echo "  Added windows-x86_64 (nsis): $bundle_name"
                fi
                ;;
            esac
          done

          if [ "$PLATFORMS" = "{}" ]; then
            echo "No .sig files found in release assets. Skipping latest.json generation."
            exit 0
          fi

          echo "Generating latest.json..."
          jq -n --arg version "$RELEASE_TAG" --argjson platforms "$PLATFORMS" '{
            version: $version,
            notes: "",
            pub_date: (now | todate),
            platforms: $platforms
          }' > latest.json

          echo "Uploading latest.json to release..."
          gh release upload "$RELEASE_TAG" latest.json \
            --repo "$REPO" \
            --clobber

          echo "Done. latest.json content:"
          cat latest.json
